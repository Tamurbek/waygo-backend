services:
  db:
    image: postgres:15-alpine
    container_name: waygo_db_container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: waygo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: waygo_redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: waygo_backend_app
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # Use "db" service name from docker-compose instead of "localhost"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/waygo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
      - redis
    networks:
      - default
      - caddy_net

networks:
  caddy_net:
    external: true

volumes:
  postgres_data:
