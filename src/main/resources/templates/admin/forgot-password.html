<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayGO Admin - Parolni tiklash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FFD700; --dark: #121212; --surface: #1E1E1E; --text: #FFFFFF; --text-dim: #A0A0A0; --error: #FF4D4D; --success: #4CAF50;}
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--dark); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(255,215,0,0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(255,215,0,0.05), transparent);
        }
        .form-card {
            background: var(--surface);
            padding: 3rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; color: var(--text-dim); margin-bottom: 0.5rem; font-size: 0.875rem; }
        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #2A2A2A;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            color: #fff;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(255,215,0,0.1); }
        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .alert {
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid transparent;
        }
        .alert-error {
            background: rgba(255, 77, 77, 0.1);
            color: var(--error);
            border-color: rgba(255, 77, 77, 0.2);
        }
        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            color: var(--success);
            border-color: rgba(76, 175, 80, 0.2);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="logo">
            <img th:src="@{/images/logo_icon.png}" alt="WayGo Logo" style="width: 250px; height: auto; margin: 0 auto; display: block;" />
        </div>
        <h2 style="text-align: center; margin-bottom: 1.5rem; font-size: 1.25rem;">Parolni tiklash</h2>
        <p style="color: var(--text-dim); text-align: center; font-size: 0.875rem; margin-bottom: 2rem;">
            Elektron pochtangizni kiriting va biz sizga parolni tiklash havolasini yuboramiz.
        </p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:if="${success == null}" th:action="@{/admin/forgot-password}" method="post">
            <div class="form-group">
                <label>Elektron pochta (Email)</label>
                <input type="email" name="email" placeholder="admin@waygo.uz" required>
            </div>
            <button type="submit" class="btn">Yuborish</button>
        </form>

        <a th:href="@{/admin/login}" class="back-link">← Kirish sahifasiga qaytish</a>
    </div>
<script th:replace="~{admin/fragments :: scripts}"></script>
</body>
</html>
