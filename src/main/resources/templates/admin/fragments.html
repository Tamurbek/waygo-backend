<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">WayGO Admin</title>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/logo_launcher.png}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { 
            --primary: #3B82F6; 
            --primary-hover: #60A5FA;
            --dark: #0F172A; 
            --surface: #1E293B; 
            --surface-hover: #334155;
            --text: #F8FAFC; 
            --text-dim: #94A3B8; 
            --success: #10B981; 
            --pending: #F59E0B; 
            --error: #EF4444; 
            --info: #3B82F6;
            --warning: #F59E0B;
            --border: rgba(255,255,255,0.1);
            --input-bg: rgba(0,0,0,0.2);
            --input-focus: rgba(0,0,0,0.3);
            --overlay-light: rgba(255,255,255,0.05);
            --overlay-hover: rgba(255,255,255,0.1);
            --modal-bg: rgba(0,0,0,0.6);
            --nav-active-bg: rgba(59, 130, 246, 0.15);
            --nav-active-text: #60A5FA;
        }
        [data-theme="light"] {
            --primary: #2563EB; 
            --primary-hover: #1D4ED8;
            --dark: #FFFFFF; 
            --surface: #F8F9FA; 
            --surface-hover: #F1F5F9;
            --text: #111827; 
            --text-dim: #6B7280;
            --border: #E5E7EB;
            --input-bg: #F3F4F6;
            --input-focus: #E5E7EB;
            --overlay-light: rgba(0,0,0,0.04);
            --overlay-hover: rgba(0,0,0,0.08);
            --modal-bg: rgba(0,0,0,0.4);
            --nav-active-bg: rgba(37, 99, 235, 0.08);
            --nav-active-text: #2563EB;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--dark); color: var(--text); display: flex; min-height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background-color: var(--surface); border-right: 1px solid var(--border); padding: 2rem 1rem; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar nav { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; overflow-y: auto; margin-bottom: 1.5rem; padding-right: 0.25rem; }
        .sidebar nav::-webkit-scrollbar { width: 4px; }
        .sidebar nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 3rem; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; flex-shrink: 0; }
        .nav-item { padding: 0.75rem 1rem; border-radius: 0.5rem; color: var(--text-dim); text-decoration: none; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; transition: all 0.2s; font-weight: 500; }
        .nav-item i { font-size: 1.25rem; }
        .nav-item:hover, .nav-item.active { background-color: var(--nav-active-bg); color: var(--nav-active-text); }
        
        /* Dropdown/Submenu Styles */
        .submenu { display: none; padding-left: 1.25rem; flex-direction: column; gap: 0.25rem; margin-bottom: 0.5rem; transition: all 0.3s ease; }
        .submenu.open { display: flex; }
        .dropdown-toggle { cursor: pointer; user-select: none; justify-content: space-between !important; }
        .dropdown-toggle .chevron { transition: transform 0.2s; font-size: 1rem !important; }
        .dropdown-toggle.open .chevron { transform: rotate(180deg); }
        .submenu-item { padding: 0.6rem 1rem; font-size: 0.9rem; border-radius: 0.5rem; color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 0.75rem; transition: all 0.2s; font-weight: 500; }
        .submenu-item i { font-size: 1.25rem; }
        .submenu-item:hover, .submenu-item.active { background-color: var(--nav-active-bg); color: var(--nav-active-text); }
        
        /* Layout */
        .main-content { flex: 1; padding: 2rem 3rem; overflow-y: auto; }
        .card { background: var(--surface); border-radius: 1rem; padding: 1.5rem; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .card-title { font-size: 1.25rem; font-weight: 600; color: var(--text); }
        
        /* Tables */
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 0.5rem; }
        th { text-align: left; padding: 1rem; color: var(--text-dim); border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; vertical-align: middle; transition: background 0.2s; }
        tr:hover td { background: var(--surface-hover); }
        tr:last-child td { border-bottom: none; }
        
        /* Badges */
        .status-badge { padding: 0.35rem 0.85rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: inline-flex; align-items: center; gap: 0.35rem; }
        .status-completed, .status-active { background: rgba(25, 135, 84, 0.15); color: #20c997; border: 1px solid rgba(32, 201, 151, 0.2); }
        .status-pending { background: rgba(255, 193, 7, 0.15); color: var(--pending); border: 1px solid rgba(255, 193, 7, 0.2); }
        .status-cancelled, .status-error, .status-inactive { background: rgba(220, 53, 69, 0.15); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.2); }
        .status-started { background: rgba(13, 110, 253, 0.15); color: #6ea8fe; border: 1px solid rgba(110, 168, 254, 0.2); }
        
        /* Form Inputs */
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.875rem; font-weight: 500; }
        .form-control { width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); transition: all 0.2s; font-size: 0.95rem; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15); background: var(--input-focus); }
        .form-check { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
        .form-check-input { width: 1.1rem; height: 1.1rem; accent-color: var(--primary); cursor: pointer; }
        .form-check-label { color: var(--text); font-size: 0.95rem; cursor: pointer; }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .3s; border-radius: 34px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--text-dim); transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(13, 110, 253, 0.2); border-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); background-color: var(--primary); }

        /* Buttons */
        .btn { border: none; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.875rem; line-height: 1.5; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13,110,253,0.3); }
        .btn-outline { background: var(--overlay-light); color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--overlay-hover); }
        .btn-danger { background: rgba(220, 53, 69, 0.1); color: #ff6b6b; border: 1px solid rgba(220, 53, 69, 0.2); }
        .btn-danger:hover { background: #dc3545; color: white; border-color: #dc3545; }
        .btn-warning { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.2); }
        .btn-warning:hover { background: #ffc107; color: #000; border-color: #ffc107; }
        .btn-icon { padding: 0.5rem; border-radius: 0.375rem; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; border: none; background: transparent; cursor: pointer; }
        .btn-icon-edit { color: #ffc107; }
        .btn-icon-edit:hover { background: rgba(255, 193, 7, 0.15); }
        .btn-icon-delete { color: #ff6b6b; }
        .btn-icon-delete:hover { background: rgba(220, 53, 69, 0.15); }

        /* Action Cell */
        .actions { display: flex; gap: 0.5rem; align-items: center; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--modal-bg); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border-radius: 1rem; border: 1px solid var(--border); width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; transform: translateY(20px); opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal { transform: translateY(0); opacity: 1; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 1.25rem; font-weight: 600; color: var(--text); margin: 0; }
        .modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 0.5rem; border-radius: 0.5rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--overlay-light); color: var(--text); }
        .modal-body { padding: 1.5rem; max-height: 70vh; overflow-y: auto; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 1rem; background: var(--input-bg); }
    </style>
    <script>
        const savedTheme = localStorage.getItem('waygo-admin-theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body>

    <div th:fragment="sidebar(activeItem)" class="sidebar">
        <a th:href="@{/admin/dashboard}" class="logo">
            <img th:src="@{/images/logo_icon.png}" alt="WayGo Logo" style="width: 150px; height: auto;" />
            <span style="display: none;">WayGO Admin</span>
        </a>
        
        <nav>
            <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${activeItem == 'dashboard' ? 'active' : ''}">
                <i class="ph ph-squares-four"></i> Dashboard
            </a>
            <a th:href="@{/admin/drivers}" class="nav-item" th:classappend="${activeItem == 'drivers' ? 'active' : ''}">
                <i class="ph ph-steering-wheel"></i> Haydovchilar
            </a>
            <a th:href="@{/admin/passengers}" class="nav-item" th:classappend="${activeItem == 'passengers' ? 'active' : ''}">
                <i class="ph ph-users"></i> Mijozlar
            </a>
            <a th:href="@{/admin/orders}" class="nav-item" th:classappend="${activeItem == 'orders' ? 'active' : ''}">
                <i class="ph ph-receipt"></i> Buyurtmalar
            </a>
            <a th:href="@{/admin/payments}" class="nav-item" th:classappend="${activeItem == 'payments' ? 'active' : ''}">
                <i class="ph ph-credit-card"></i> To'lovlar
            </a>
            <a th:href="@{/admin/settings}" class="nav-item" th:classappend="${activeItem == 'settings' ? 'active' : ''}">
                <i class="ph ph-gear"></i> Sozlamalar
            </a>

            <div class="nav-dropdown">
                <div class="nav-item dropdown-toggle" onclick="toggleDropdown(this)" th:classappend="${activeItem.startsWith('config_') ? 'open' : ''}">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <i class="ph ph-folders"></i> Ma'lumotnomalar
                    </div>
                    <i class="ph ph-caret-down chevron"></i>
                </div>
                <div class="submenu" th:classappend="${activeItem.startsWith('config_') ? 'open' : ''}">
                    <a th:href="@{/admin/config/tariffs}" class="submenu-item" th:classappend="${activeItem == 'config_tariffs' ? 'active' : ''}">
                        <i class="ph ph-tag"></i> Tariflar
                    </a>
                    <a th:href="@{/admin/config/regions}" class="submenu-item" th:classappend="${activeItem == 'config_regions' ? 'active' : ''}">
                        <i class="ph ph-map-pin"></i> Viloyatlar
                    </a>
                    <a th:href="@{/admin/config/cars}" class="submenu-item" th:classappend="${activeItem == 'config_cars' ? 'active' : ''}">
                        <i class="ph ph-car"></i> Mashinalar
                    </a>
                    <a th:href="@{/admin/config/services}" class="submenu-item" th:classappend="${activeItem == 'config_services' ? 'active' : ''}">
                        <i class="ph ph-sparkle"></i> Xizmatlar
                    </a>
                    <a th:href="@{/admin/config/top-up-steps}" class="submenu-item" th:classappend="${activeItem == 'config_top_up_steps' ? 'active' : ''}">
                        <i class="ph ph-list-numbers"></i> Qo'llanma
                    </a>
                </div>
            </div>
            
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                <button type="button" class="nav-item" style="width: 100%; border: none; background: transparent; cursor: pointer; text-align: left;" onclick="toggleTheme()">
                    <i class="ph ph-moon" id="theme-icon"></i> <span id="theme-text">Tungi rejim</span>
                </button>
                <a th:href="@{/admin/logout}" class="nav-item" style="color: #ff6b6b; margin-top: 0.5rem;">
                    <i class="ph ph-sign-out"></i> Chiqish
                </a>
            </div>
        </nav>
        
        <div style="margin-top: auto; padding: 1rem; background: var(--input-bg); border-radius: 0.5rem; border: 1px solid var(--border);">
            <div style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.25rem;">Tizim versiyasi</div>
            <div style="font-size: 0.875rem; font-weight: 600; color: var(--text);">v1.0.4-beta</div>
        </div>
    </div>
    
    <script th:fragment="scripts">
        // Theme Toggler
        function updateThemeUI() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (icon && text) {
                if (isLight) {
                    icon.className = 'ph ph-sun';
                    text.textContent = 'Kunduzgi rejim';
                } else {
                    icon.className = 'ph ph-moon';
                    text.textContent = 'Tungi rejim';
                }
            }
        }
        
        function toggleDropdown(element) {
            element.classList.toggle('open');
            const submenu = element.nextElementSibling;
            if (submenu) {
                submenu.classList.toggle('open');
            }
        }
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            if (newTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('waygo-admin-theme', newTheme);
            updateThemeUI();
        }
        
        document.addEventListener('DOMContentLoaded', updateThemeUI);
    </script>
</body>
</html>
