<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">WayGO Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #FFD700; 
            --dark: #121212; 
            --surface: #1E1E1E; 
            --text: #FFFFFF; 
            --text-dim: #A0A0A0; 
            --success: #00FF80; 
            --pending: #FFD700; 
            --error: #FF4D4D; 
            --info: #007AFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--dark); color: var(--text); display: flex; min-height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background-color: var(--surface); border-right: 1px solid rgba(255,255,255,0.05); padding: 2rem 1rem; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 3rem; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .nav-item { padding: 0.75rem 1rem; border-radius: 0.5rem; color: var(--text-dim); text-decoration: none; margin-bottom: 0.5rem; display: block; transition: all 0.2s; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255, 215, 0, 0.1); color: var(--primary); }
        
        /* Layout */
        .main-content { flex: 1; padding: 2rem 3rem; }
        .card { background: var(--surface); border-radius: 1rem; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th { text-align: left; padding: 1rem; color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        
        /* Badges */
        .status-badge { padding: 0.35rem 0.85rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: inline-block; }
        .status-completed, .status-active { background: rgba(0, 255, 128, 0.1); color: var(--success); }
        .status-pending { background: rgba(255, 215, 0, 0.1); color: var(--pending); }
        .status-cancelled, .status-error { background: rgba(255, 77, 77, 0.1); color: var(--error); }
        .status-started { background: rgba(0, 122, 255, 0.1); color: var(--info); }
        
        /* Components */
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333; }
        .btn { border: none; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block; font-size: 0.875rem; }
        .btn-primary { background: var(--primary); color: var(--dark); }
        .btn-outline { background: rgba(255,215,0,0.05); color: var(--primary); border: 1px solid rgba(255,215,0,0.2); }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div th:fragment="sidebar(activeItem)" class="sidebar">
        <a th:href="@{/admin/dashboard}" class="logo"><span>🚖</span> WayGO Admin</a>
        
        <nav>
            <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${activeItem == 'dashboard' ? 'active' : ''}">
                Dashboard
            </a>
            <a th:href="@{/admin/drivers}" class="nav-item" th:classappend="${activeItem == 'drivers' ? 'active' : ''}">
                Haydovchilar
            </a>
            <a th:href="@{/admin/passengers}" class="nav-item" th:classappend="${activeItem == 'passengers' ? 'active' : ''}">
                Mijozlar
            </a>
            <a th:href="@{/admin/orders}" class="nav-item" th:classappend="${activeItem == 'orders' ? 'active' : ''}">
                Buyurtmalar
            </a>
            <a th:href="@{/admin/settings}" class="nav-item" th:classappend="${activeItem == 'settings' ? 'active' : ''}">
                Sozlamalar
            </a>
            
            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <a th:href="@{/admin/logout}" class="nav-item" style="color: var(--error);">
                    🚪 Chiqish
                </a>
            </div>
        </nav>
        
        <div style="margin-top: auto; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 0.5rem;">
            <div style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.25rem;">Tizim versiyasi</div>
            <div style="font-size: 0.875rem; font-weight: 600;">v1.0.4-beta</div>
        </div>
    </div>

</body>
</html>
