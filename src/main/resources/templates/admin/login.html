<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayGO Admin - Kirish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0D6EFD; --dark: #0B0E11; --surface: #1B2026; --text: #F8F9FA; --text-dim: #94A3B8; --error: #DC3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--dark); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(13,110,253,0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(13,110,253,0.05), transparent);
        }
        .login-card {
            background: var(--surface);
            padding: 3rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; color: var(--text-dim); margin-bottom: 0.5rem; font-size: 0.875rem; }
        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #2A2A2A;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            color: #fff;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(13,110,253,0.1); }
        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .error-msg {
            background: rgba(255, 77, 77, 0.1);
            color: var(--error);
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🚖 WayGO</div>
        
        <div th:if="${param.error}" class="error-msg">
            Noma'lum telefon yoki parol kiritildi.
        </div>
        
        <div th:if="${param.logout}" class="error-msg" style="color: var(--primary); background: rgba(13,110,253,0.05); border-color: rgba(13,110,253,0.1);">
            Tizimdan chiqdingiz.
        </div>

        <div th:if="${param.resetSuccess}" class="error-msg" style="color: #4CAF50; background: rgba(76, 175, 80, 0.05); border-color: rgba(76, 175, 80, 0.1);">
            Parol muvaffaqiyatli yangilandi. Endi kirishingiz mumkin.
        </div>

        <form th:action="@{/admin/perform_login}" method="post">
            <div class="form-group">
                <label>Elektron pochta (Email)</label>
                <input type="email" name="username" placeholder="admin@waygo.uz" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label style="margin-bottom: 0;">Parol</label>
                    <a th:href="@{/admin/forgot-password}" style="color: var(--primary); text-decoration: none; font-size: 0.75rem;">Parolni unutdingizmi?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Kirish</button>
        </form>
    </div>
</body>
</html>
