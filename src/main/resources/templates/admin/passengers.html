<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head(${title})}"></head>
<body>
    <div th:replace="~{admin/fragments :: sidebar('passengers')}"></div>

    <div class="main-content">
        <h1 th:text="${title}">Mijozlar</h1>
        
        <div class="card" style="margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <h2 style="font-size: 1.125rem;">Barcha mijozlar (Yo'lovchilar)</h2>
                <div style="font-size: 0.875rem; color: var(--text-dim);" th:text="|${#lists.size(passengers)} ta foydalanuvchi|">0 ta</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Avatar</th>
                        <th>Ism</th>
                        <th>Telefon</th>
                        <th>Ro'yxatdan o'tgan</th>
                        <th>Amallar</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="passenger : ${passengers}">
                        <td>
                            <div style="position: relative; width: 40px; height: 40px; flex-shrink: 0;">
                                <th:block th:if="${passenger.imageUrl != null and !passenger.imageUrl.isEmpty()}">
                                    <img th:src="${passenger.imageUrl}" class="avatar"
                                         style="width:40px;height:40px;border-radius:50%;object-fit:cover;"
                                         th:onerror="'this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\';'"
                                    >
                                    <div th:text="${passenger.initials}"
                                         style="display:none;width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;font-weight:700;font-size:0.9rem;align-items:center;justify-content:center;">
                                    </div>
                                </th:block>
                                <th:block th:if="${passenger.imageUrl == null or passenger.imageUrl.isEmpty()}">
                                    <div th:text="${passenger.initials}"
                                         style="display:flex;width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;font-weight:700;font-size:0.9rem;align-items:center;justify-content:center;">
                                    </div>
                                </th:block>
                            </div>
                        </td>
                        <td style="font-weight: 500;" th:text="${passenger.fullName != null ? passenger.fullName : 'Kiritilmagan'}">Aziz</td>
                        <td th:text="${passenger.phone}">+998...</td>
                        <td style="color: var(--text-dim); font-size: 0.85rem;" th:text="${#temporals.format(passenger.createdAt, 'dd.MM.yyyy HH:mm')}">Date</td>
                        <td>
                            <a href="#" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Tarix</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(passengers)}">
                        <td colspan="5" style="text-align: center; color: var(--text-dim); padding: 4rem;">Mijozlar mavjud emas</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
<script th:replace="~{admin/fragments :: scripts}"></script>
</body>
</html>
