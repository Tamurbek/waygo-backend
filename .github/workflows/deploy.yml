name: WayGO CI/CD - Deploy to Server

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: waygo_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Tests
        run: mvn test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: GITHUB_REF_NAME
          script: |
            set -e
            TAG_NAME=${GITHUB_REF_NAME}
            cd /var/www/waygo-backend

            OLD_COMMIT=$(git rev-parse HEAD)
            STASHED=0

            if [ -n "$(git status --porcelain)" ]; then
              echo "Uncommitted local changes detected; stashing before checkout..."
              git stash push -u -m "pre-deploy-${TAG_NAME}"
              STASHED=1
            fi

            echo "Starting deployment of version $TAG_NAME..."
            if git fetch --tags -f && git checkout "$TAG_NAME" && bash ./deploy.sh; then
              if [ "$STASHED" = "1" ]; then
                echo "Dropping pre-deploy stash (using $TAG_NAME from repository)."
                git stash drop || true
              fi
              echo "Deployment of $TAG_NAME successful!"
            else
              echo "Deployment failed! Rolling back to $OLD_COMMIT..."
              git reset --hard "$OLD_COMMIT"
              if [ "$STASHED" = "1" ]; then
                echo "Re-applying stashed local changes..."
                git stash pop || echo "Warning: could not re-apply stash; check git stash list on the server."
              fi
              if [ -f ./deploy.sh ]; then
                bash ./deploy.sh
              else
                docker compose -f docker-compose.prod.yml up -d --build
              fi
              echo "Rollback completed."
              exit 1
            fi
