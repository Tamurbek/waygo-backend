name: WayGO CI/CD - Deploy to Server

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: GITHUB_REF_NAME
          script: |
            # Use the tag name passed from GitHub Actions
            TAG_NAME=${GITHUB_REF_NAME}
            cd /var/www/waygo-backend
            
            # Save current commit for rollback
            OLD_COMMIT=$(git rev-parse HEAD)
            
            echo "Starting deployment of version $TAG_NAME..."
            if git fetch --tags && git checkout $TAG_NAME && docker compose up -d --build; then
              echo "Deployment of $TAG_NAME successful!"
            else
              echo "Deployment failed! Rolling back to $OLD_COMMIT..."
              git reset --hard $OLD_COMMIT
              docker compose up -d --build
              echo "Rollback completed."
              exit 1
            fi
