name: WayGO CI/CD - Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Papka nomi serverda chiziqcha bilan (tekshirildi)
            cd /var/www/waygo-backend
            
            # Hozirgi ishlayotgan versiyani saqlab qo'yamiz
            OLD_COMMIT=$(git rev-parse HEAD)
            
            echo "Starting deployment of new changes..."
            if git fetch origin && git reset --hard origin/main && docker compose up -d --build; then
              echo "Deployment successful!"
            else
              echo "Deployment failed! Rolling back to previous stable version ($OLD_COMMIT)..."
              git reset --hard $OLD_COMMIT
              docker compose up -d --build
              echo "Rollback completed."
              exit 1
            fi
