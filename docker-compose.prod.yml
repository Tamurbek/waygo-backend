services:
  db:
    image: postgres:15-alpine
    container_name: waygo_db_container
    restart: always
    environment:
      POSTGRES_DB: waygo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - waygo-backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d waygo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waygo_net

  redis:
    image: redis:7-alpine
    container_name: waygo_redis
    restart: always
    volumes:
      - waygo-backend_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waygo_net

  app:
    build: .
    container_name: waygo_backend_app
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/waygo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - waygo_net
      - caddy_net

networks:
  waygo_net:
    driver: bridge
  caddy_net:
    external: true

volumes:
  waygo-backend_postgres_data:
    external: true
  waygo-backend_redis_data:
