services:
  db:
    image: postgres:15-alpine
    container_name: waygo_db_container
    restart: always
    environment:
      POSTGRES_DB: waygo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - waygo-backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d waygo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waygo_net

  redis:
    image: redis:7-alpine
    container_name: waygo_redis
    restart: always
    volumes:
      - waygo-backend_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waygo_net

  app_blue:
    build: .
    container_name: waygo_backend_app_blue
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/waygo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - /var/www/waygo-uploads:/app/uploads
      - /var/www/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - db
      - redis
    networks:
      - waygo_net

  app_green:
    build: .
    container_name: waygo_backend_app_green
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/waygo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - /var/www/waygo-uploads:/app/uploads
      - /var/www/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - db
      - redis
    networks:
      - waygo_net

  gateway:
    image: nginx:alpine
    container_name: waygo_gateway
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    depends_on:
      - app_blue
      - app_green
    networks:
      - waygo_net

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: waygo_db_backup
    restart: always
    volumes:
      - ./backups:/backups
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=waygo_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - SCHEDULING=true
      - BACKUP_NUM_KEEP=14
      - SCHEDULE=0 2 * * *
      - BACKUP_DIR=/backups
      - TZ=Asia/Tashkent
    networks:
      - waygo_net

networks:
  waygo_net:
    driver: bridge

volumes:
  waygo-backend_postgres_data:
    external: true
  waygo-backend_redis_data:
